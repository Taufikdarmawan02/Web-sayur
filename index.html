<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Terpadu - Segari Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-radius: 24px;
            padding: 32px;
        }
        .btn-active:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4">

    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-6">
            <span class="text-3xl font-black text-green-600 tracking-tight">se<span class="text-orange-500">gari</span></span>
            <span class="block text-xs font-medium text-gray-400 mt-1">Satu Akun, Banyak Kemudahan</span>
        </div>

        <!-- Pemilih Login Tabs -->
        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button onclick="toggleLoginType('konsumen')" id="tab-konsumen" class="flex-1 py-2 text-xs font-bold rounded-lg text-center bg-white text-green-600 shadow-sm transition-all duration-200">
                Konsumen
            </button>
            <button onclick="toggleLoginType('toko')" id="tab-toko" class="flex-1 py-2 text-xs font-bold rounded-lg text-center text-gray-500 hover:text-green-600 transition-all duration-200">
                Toko (Mitra)
            </button>
            <button onclick="toggleLoginType('admin')" id="tab-admin" class="flex-1 py-2 text-xs font-bold rounded-lg text-center text-gray-500 hover:text-green-600 transition-all duration-200">
                Admin
            </button>
        </div>

        <!-- Form Login -->
        <form id="login-form" onsubmit="handleLoginSubmit(event)" class="space-y-4">
            <!-- Label Tipe Dinamis -->
            <div class="border-l-4 border-green-500 pl-3 py-1 mb-2">
                <span id="role-title" class="text-xs font-black text-green-700 uppercase tracking-wider">Login Konsumen</span>
                <p id="role-desc" class="text-[10px] text-gray-400">Gunakan akun pembeli untuk memesan produk segar.</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Email / Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="username" required class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 text-gray-800" placeholder="Masukkan nama/email">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Kata Sandi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" required class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 text-gray-800" placeholder="••••••••">
                </div>
            </div>

            <!-- Petunjuk Demo Login -->
            <div class="bg-gray-50 p-2.5 rounded-lg text-[10px] text-gray-500">
                <p class="font-bold mb-0.5 text-gray-600"><i data-lucide="info" class="w-3.5 h-3.5 inline mr-1 text-blue-500"></i> Akun Demo:</p>
                <p id="demo-creds">Konsumen: <span class="font-mono text-black">budi</span> / sandi: <span class="font-mono text-black">budi</span></p>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-xs btn-active transition-all shadow-md flex items-center justify-center gap-1">
                <span>Masuk Sekarang</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>

            <button type="button" onclick="window.location.href='index.html'" class="w-full bg-white border border-gray-300 text-gray-600 font-bold py-2.5 rounded-xl text-xs btn-active transition hover:bg-gray-50">
                Kembali ke Beranda Belanja
            </button>
        </form>
    </div>

    <script>
        let selectedRole = 'konsumen';

        function toggleLoginType(role) {
            selectedRole = role;
            
            // Atur Class Tombol Nav
            const tabs = ['konsumen', 'toko', 'admin'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === role) {
                    el.className = `flex-1 py-2 text-xs font-bold rounded-lg text-center bg-white shadow-sm transition-all duration-200 ${role === 'admin' ? 'text-indigo-600' : role==='toko' ? 'text-orange-500' : 'text-green-600'}`;
                } else {
                    el.className = "flex-1 py-2 text-xs font-bold rounded-lg text-center text-gray-500 hover:text-green-600 transition-all duration-200";
                }
            });

            // Ganti Judul
            const roleTitle = document.getElementById('role-title');
            const roleDesc = document.getElementById('role-desc');
            const demoCreds = document.getElementById('demo-creds');
            const formBtn = document.querySelector('form button[type="submit"]');

            if (role === 'konsumen') {
                roleTitle.innerText = "Login Konsumen";
                roleTitle.className = "text-xs font-black text-green-700 uppercase tracking-wider";
                roleDesc.innerText = "Gunakan akun pembeli untuk memesan produk segar.";
                demoCreds.innerHTML = 'Konsumen: <span class="font-mono text-black">budi</span> / Sandi: <span class="font-mono text-black">budi</span>';
                formBtn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-xs btn-active transition-all shadow-md flex items-center justify-center gap-1";
            } else if (role === 'toko') {
                roleTitle.innerText = "Login Mitra Toko";
                roleTitle.className = "text-xs font-black text-orange-700 uppercase tracking-wider";
                roleDesc.innerText = "Masuk ke dashboard penjualan untuk mengelola toko Anda.";
                demoCreds.innerHTML = 'Mitra Toko: <span class="font-mono text-black">mitratani</span> / Sandi: <span class="font-mono text-black">toko</span>';
                formBtn.className = "w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-xs btn-active transition-all shadow-md flex items-center justify-center gap-1";
            } else if (role === 'admin') {
                roleTitle.innerText = "Login Admin Sistem";
                roleTitle.className = "text-xs font-black text-indigo-700 uppercase tracking-wider";
                roleDesc.innerText = "Akses panel kontrol utama sistem Segari Ecosystem.";
                demoCreds.innerHTML = 'Admin Utama: <span class="font-mono text-black">admin</span> / Sandi: <span class="font-mono text-black">admin</span>';
                formBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-xs btn-active transition-all shadow-md flex items-center justify-center gap-1";
            }
        }

        function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (selectedRole === 'konsumen') {
                if (user === 'budi' && pass === 'budi') {
                    localStorage.setItem('role', 'konsumen');
                    localStorage.setItem('userName', 'Budi Santoso');
                    window.location.href = 'index.html';
                } else {
                    alert('Data login Konsumen salah!');
                }
            } 
            else if (selectedRole === 'toko') {
                if (user === 'mitratani' && pass === 'toko') {
                    localStorage.setItem('role', 'toko');
                    localStorage.setItem('userName', 'Mitra Tani Sejahtera');
                    window.location.href = 'toko.html';
                } else {
                    alert('Data login Mitra Toko salah!');
                }
            } 
            else if (selectedRole === 'admin') {
                if (user === 'admin' && pass === 'admin') {
                    localStorage.setItem('role', 'admin');
                    localStorage.setItem('userName', 'Admin Pusat');
                    window.location.href = 'admin.html';
                } else {
                    alert('Data login Admin Utama salah!');
                }
            }
        }

        window.onload = () => { lucide.createIcons(); }
    </script>
</body>
</html>
